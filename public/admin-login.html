<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-50 flex items-center justify-center h-screen font-sans">
  <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-sm">
    <h1 class="text-2xl font-bold text-pink-600 text-center mb-6">Painel Administrativo</h1>
    <form id="loginForm" class="space-y-4">
      <input type="text" id="usuario" placeholder="Usuário" class="w-full p-3 border border-pink-300 rounded-lg" required />
      <input type="password" id="senha" placeholder="Senha" class="w-full p-3 border border-pink-300 rounded-lg" required />
      <button type="submit" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-3 rounded-lg">Entrar</button>
    </form>
    <p id="erro" class="text-red-500 text-sm mt-3 hidden text-center">Usuário ou senha incorretos.</p>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const usuario = document.getElementById("usuario").value;
      const senha = document.getElementById("senha").value;

      if (usuario === "Boaventura" && senha === "asap") {
        localStorage.setItem("admin_logado", "true");
        window.location.href = "admin-painel.html";
      } else {
        document.getElementById("erro").classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
