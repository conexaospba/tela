<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Pagamento via Pix</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fefefe;
      padding: 20px;
      text-align: center;
    }

    #qrcode img {
      margin-top: 20px;
      max-width: 300px;
    }

    textarea {
      width: 80%;
      margin-top: 10px;
    }

    button {
      padding: 10px 20px;
      margin-top: 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #mensagem {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Pagamento com Pix</h1>
  <p>Você terá um desconto especial: <strong>R$ 249,95</strong></p>
  <button id="gerarPix">Gerar QR Code</button>

  <div id="qrcode"></div>
  <div id="mensagem"></div>

  <script>
    document.getElementById("gerarPix").addEventListener("click", async () => {
      const nome = localStorage.getItem("nomeComprador");
      const cpf = localStorage.getItem("cpf");
      const email = localStorage.getItem("email");
      const telefone = localStorage.getItem("telefone");
      const sessionID = localStorage.getItem("sessionID");

      if (!nome || !cpf || !email || !telefone || !sessionID) {
        document.getElementById("mensagem").textContent = "Dados incompletos. Retorne e preencha os dados corretamente.";
        return;
      }

      try {
        const response = await fetch("/criar-pix", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nome, cpf, email, telefone, sessionID }),
        });

        const data = await response.json();

        if (data.success && data.object) {
          document.getElementById("qrcode").innerHTML = `
            <img src="${data.object.qrCodeImage}" alt="QR Code Pix" />
            <p>Código Pix Copia e Cola:</p>
            <textarea rows="3" readonly>${data.object.qrCode}</textarea>
          `;
          document.getElementById("mensagem").textContent = "";
        } else {
          document.getElementById("mensagem").textContent = data.message || "Erro ao gerar cobrança Pix.";
        }
      } catch (err) {
        document.getElementById("mensagem").textContent = "Erro de conexão com o servidor.";
      }
    });
  </script>
</body>
</html>
