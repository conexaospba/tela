<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pagamento via Pix - RisePay</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 30px; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    h2 { color: #d63384; }
    #qrcode { text-align: center; margin-top: 20px; }
    #pixcopiacola { background: #eee; padding: 10px; margin-top: 10px; border-radius: 5px; word-break: break-all; }
    button { background: #d63384; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-size: 16px; margin-top: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Pagamento via Pix</h2>
    <p>Você ganhou <strong>50% de desconto</strong> pagando via Pix! O valor com desconto é <strong>R$ 249,95</strong>.</p>

    <button onclick="gerarPix()">Gerar Código Pix</button>

    <div id="qrcode"></div>
    <div id="pixcopiacola"></div>
  </div>

  <script>
    async function gerarPix() {
      const resposta = await fetch("/criar-pix", { method: "POST" });
      const resultado = await resposta.json();

      if (resposta.ok) {
        document.getElementById("qrcode").innerHTML = '<img src="' + resultado.qrCodeImage + '" alt="QR Code Pix" width="250">';
        document.getElementById("pixcopiacola").innerText = resultado.pixCode;
      } else {
        alert("Erro ao gerar cobrança Pix.");
      }
    }
  </script>
</body>
</html>
