<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pagamento em Análise</title>
  <style>
    body { font-family: Quicksand, Arial, sans-serif; background: #fff7fb; margin: 0; padding: 0; }
    .logo { display: block; margin: 16px auto; max-width: 150px; }
    .container { max-width: 600px; margin: 80px auto; background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); text-align: center; }
    h1 { color: #be4299; margin-bottom: 16px; }
    p  { color: #333; line-height: 1.5; }
    .btn-home { display: inline-block; margin-top: 24px; padding: 12px 24px; background: #be4299; color: #fff; text-decoration: none; border-radius: 6px; }
    .btn-home:hover { background: #a62e80; }
  </style>
</head>
<body>
  <!-- Logo no topo -->
  <img src="imagens/logo.png" alt="Dream Baby" class="logo">

  <div class="container">
    <h1>Pagamento em Análise</h1>
    <p>
      Seu pagamento foi recebido com sucesso e está em análise.<br>
      Assim que for aprovado, você receberá uma confirmação por e-mail e WhatsApp.
    </p>
    <a href="/" class="btn-home">Voltar à Home</a>
  </div>
</body>
</html>
