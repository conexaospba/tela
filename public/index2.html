
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Personalize sua Boneca Reborn</title>
  <style>
    body { font-family: 'Quicksand', sans-serif; background: #fff0f7; margin: 0; padding: 0; }
    .logo { display: block; margin: 20px auto; max-width: 150px; }
    .container {
      max-width: 500px; margin: 0 auto; background: white;
      border-radius: 12px; box-shadow: 0 0 10px #ffc6e2; padding: 30px;
    }
    h2 { color: #be4299; text-align: center; }
    .step { display: none; }
    .step.active { display: block; }
    label { margin-top: 12px; display: block; font-weight: bold; }
    input, select {
      width: 100%; padding: 10px; margin-top: 5px;
      border-radius: 8px; border: 1px solid #be4299;
      font-size: 1em;
    }
    button {
      background: #be4299; color: white; border: none; border-radius: 8px;
      padding: 12px; margin-top: 20px; font-size: 1em; width: 100%;
      cursor: pointer;
    }
    button.secondary { background: #bbb; }
    video { width: 100%; margin-top: 10px; border-radius: 8px; display: none; }
    #step-indicator { text-align: center; font-weight: bold; margin-bottom: 10px; }
  </style>
</head>
<body>
  <img src="imagens/logo.png" alt="Logo" class="logo">
  <div class="container">
    <h2>Personalize sua Boneca Reborn</h2>
    <div id="step-indicator"></div>

    <div class="step active" id="step-1">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" required>
      <button onclick="nextStep()">Próximo</button>
    </div>

    <div class="step" id="step-2">
      <label for="cpf">CPF</label>
      <input type="text" id="cpf" placeholder="000.000.000-00" required>
      <button class="secondary" onclick="prevStep()">Voltar</button>
      <button onclick="validateCPF()">Próximo</button>
    </div>

    <div class="step" id="step-3">
      <label for="telefone">Telefone</label>
      <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
      <button class="secondary" onclick="prevStep()">Voltar</button>
      <button onclick="nextStep()">Próximo</button>
    </div>

    <div class="step" id="step-4">
      <label for="email">E-mail</label>
      <input type="email" id="email" required>
      <button class="secondary" onclick="prevStep()">Voltar</button>
      <button onclick="nextStep()">Próximo</button>
    </div>

    <div class="step" id="step-5">
      <label for="boneca">Nome da boneca</label>
      <select id="boneca" onchange="trocarVideo()">
        <option value="Maria">Maria</option>
        <option value="Sofia">Sofia</option>
        <option value="Valentina">Valentina</option>
      </select>
      <video id="videoBoneca" controls autoplay muted loop></video>
      <button class="secondary" onclick="prevStep()">Voltar</button>
      <button onclick="nextStep()">Próximo</button>
    </div>

    <div class="step" id="step-6">
      <label for="cabelo">Cor do cabelo</label>
      <select id="cabelo">
        <option value="Castanho">Castanho</option>
        <option value="Loiro">Loiro</option>
        <option value="Preto">Preto</option>
        <option value="Ruivo">Ruivo</option>
      </select>
      <label for="olhos">Cor dos olhos</label>
      <select id="olhos">
        <option value="Azuis">Azuis</option>
        <option value="Verdes">Verdes</option>
        <option value="Castanhos">Castanhos</option>
      </select>
      <button class="secondary" onclick="prevStep()">Voltar</button>
      <button onclick="nextStep()">Próximo</button>
    </div>

    <div class="step" id="step-7">
      <label for="pagamento">Forma de pagamento</label>
      <select id="pagamento">
        <option value="pix">Pix (R$ 249,95)</option>
        <option value="cartao">Cartão de Crédito (R$ 499,90)</option>
      </select>
      <button class="secondary" onclick="prevStep()">Voltar</button>
      <button onclick="finalizar()">Finalizar</button>
    </div>
  </div>

  <script>
    let stepAtual = 1;
    const totalEtapas = 7;

    function updateIndicator() {
      document.getElementById("step-indicator").textContent = "Etapa " + stepAtual + " de " + totalEtapas;
    }

    function showStep(step) {
      document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
      document.getElementById("step-" + step).classList.add("active");
      stepAtual = step;
      updateIndicator();
    }

    function nextStep() {
      if (stepAtual < totalEtapas) showStep(stepAtual + 1);
    }

    function prevStep() {
      if (stepAtual > 1) showStep(stepAtual - 1);
    }

    function validateCPF() {
      const cpf = document.getElementById("cpf").value.replace(/\D/g, '');
      let sum = 0, remainder;

      if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) {
        alert("CPF inválido.");
        return;
      }

      for (let i = 1; i <= 9; i++) sum += parseInt(cpf.substring(i - 1, i)) * (11 - i);
      remainder = (sum * 10) % 11;
      if (remainder === 10 || remainder === 11) remainder = 0;
      if (remainder !== parseInt(cpf.charAt(9))) {
        alert("CPF inválido.");
        return;
      }

      sum = 0;
      for (let i = 1; i <= 10; i++) sum += parseInt(cpf.substring(i - 1, i)) * (12 - i);
      remainder = (sum * 10) % 11;
      if (remainder === 10 || remainder === 11) remainder = 0;
      if (remainder !== parseInt(cpf.charAt(10))) {
        alert("CPF inválido.");
        return;
      }

      nextStep();
    }

    function trocarVideo() {
      const boneca = document.getElementById("boneca").value;
      const video = document.getElementById("videoBoneca");
      video.src = "videos/" + boneca + ".mp4";
      video.style.display = "block";
    }

    function finalizar() {
      const nome = document.getElementById("nome").value;
      const cpf = document.getElementById("cpf").value;
      const telefone = document.getElementById("telefone").value;
      const email = document.getElementById("email").value;
      const boneca = document.getElementById("boneca").value;
      const cabelo = document.getElementById("cabelo").value;
      const olhos = document.getElementById("olhos").value;
      const pagamento = document.getElementById("pagamento").value;
      const sessionID = crypto.randomUUID();

      if (!nome || !cpf || !telefone || !email) {
        alert("Preencha todos os dados corretamente.");
        return;
      }

      localStorage.setItem("nomeComprador", nome);
      localStorage.setItem("cpf", cpf);
      localStorage.setItem("telefone", telefone);
      localStorage.setItem("email", email);
      localStorage.setItem("boneca", boneca);
      localStorage.setItem("cabelo", cabelo);
      localStorage.setItem("olhos", olhos);
      localStorage.setItem("pagamento", pagamento);
      localStorage.setItem("sessionID", sessionID);

      if (pagamento === "pix") {
        window.location.href = "pagamento-pix.html";
      } else {
        window.location.href = "pagamento-cartao.html";
      }
    }

    updateIndicator();
  </script>
</body>
</html>
